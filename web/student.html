<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Didi — Study Session</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- VAD: ONNX Runtime + Silero VAD (v0.0.22 stable) -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/ort.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.22/dist/bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --warm-bg: #FAF5F0;
            --primary: #FF6B35;
            --primary-light: #FFF0E8;
            --didi-bubble: #FFFFFF;
            --student-bubble: #FF6B35;
            --text: #2D2D2D;
            --text-light: #8A8A8A;
            --border: #EDE5DC;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--warm-bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100dvh;
        }

        /* ─── Header ─────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid var(--border);
            gap: 12px;
            flex-shrink: 0;
        }

        .header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B35, #FFA726);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .header-info {
            flex: 1;
        }

        .header-name {
            font-size: 16px;
            font-weight: 800;
        }

        .header-status {
            font-size: 12px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-dot-header {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #38A169;
        }

        .header-end-btn {
            padding: 8px 14px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: transparent;
            font-family: 'Nunito', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-light);
            cursor: pointer;
        }

        /* ─── Chat Area ──────────────────────────────── */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: #D0C8C0; border-radius: 4px; }

        /* Bubbles */
        .msg {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            animation: msgIn 0.25s ease-out;
            position: relative;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.didi {
            align-self: flex-start;
            background: var(--didi-bubble);
            border-bottom-left-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }

        .msg.student {
            align-self: flex-end;
            background: var(--student-bubble);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .msg .play-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            background: var(--primary-light);
            border: none;
            font-family: 'Nunito', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
        }

        .msg.student .play-btn {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .msg .timestamp {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 4px;
        }
        .msg.student .timestamp { color: rgba(255,255,255,0.7); }
        .msg .debug-line {
            font-size: 10px;
            color: #999;
            font-family: monospace;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px dashed #ddd;
        }

        /* Typing indicator */
        .typing {
            align-self: flex-start;
            padding: 14px 20px;
            background: var(--didi-bubble);
            border-radius: 18px;
            border-bottom-left-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            display: none;
        }

        .typing.show { display: flex; gap: 5px; align-items: center; }

        .typing-text {
            font-size: 13px;
            color: var(--text-light);
            margin-left: 8px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #C0B8B0;
            border-radius: 50%;
            animation: typingBounce 1.2s ease-in-out infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* ─── Voice Status Area (replaces mic button) ─── */
        .voice-area {
            padding: 16px;
            background: white;
            border-top: 1px solid var(--border);
            text-align: center;
            flex-shrink: 0;
        }

        .voice-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .status-dot.green { background: #4CAF50; }
        .status-dot.green.pulse { animation: pulse 2s ease-in-out infinite; }
        .status-dot.green.bright { background: #66BB6A; box-shadow: 0 0 16px #4CAF50; }
        .status-dot.yellow { background: #FFC107; }
        .status-dot.blue { background: #2196F3; }
        .status-dot.red { background: #F44336; }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .status-text {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 600;
        }

        /* Fallback mic button (hidden by default) */
        .mic-fallback {
            display: none;
            text-align: center;
        }

        .mic-fallback .mic-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--primary), #FF8A50);
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(255,107,53,0.25);
        }

        .mic-fallback .mic-btn.recording {
            background: #E53E3E;
            animation: pulse 1s ease-in-out infinite;
        }

        /* Text input (optional - kept for accessibility) */
        .text-input-area {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            padding: 0 16px;
        }

        .text-input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            outline: none;
            background: var(--warm-bg);
        }

        .text-input:focus { border-color: var(--primary); }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        /* ─── Session overlay ─────────────────────────── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .overlay.show { display: flex; }

        .overlay-card {
            background: white;
            border-radius: 20px;
            padding: 28px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            box-shadow: 0 16px 48px rgba(0,0,0,0.15);
        }

        .overlay-card h2 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .overlay-card p {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        .overlay-card .stats {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .stat-box {
            text-align: center;
        }

        .stat-box .num {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-box .label {
            font-size: 12px;
            color: var(--text-light);
        }

        .overlay-btn {
            padding: 14px 32px;
            border: none;
            border-radius: 14px;
            background: var(--primary);
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-avatar">📚</div>
        <div class="header-info">
            <div class="header-name">Didi दीदी</div>
            <div class="header-status">
                <span class="status-dot-header"></span>
                <span id="headerStatus">Connecting...</span>
            </div>
        </div>
        <button class="header-end-btn" onclick="endSession()">End</button>
    </div>

    <!-- Chat -->
    <div class="chat-area" id="chatArea">
        <div class="typing" id="typing">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <span class="typing-text" id="typingText">Didi soch rahi hai...</span>
        </div>
    </div>

    <!-- Voice Status (VAD-based, no mic button) -->
    <div class="voice-area">
        <div id="voiceIndicator" class="voice-indicator">
            <div id="voiceStatus" class="status-dot green pulse"></div>
            <p id="statusText" class="status-text">Starting...</p>
        </div>

        <!-- Fallback mic button for browsers without WASM support -->
        <div id="micFallback" class="mic-fallback">
            <button id="micBtn" class="mic-btn" onclick="toggleRecording()">🎤</button>
            <p style="margin-top: 8px; font-size: 12px; color: #999;">Tap to speak</p>
        </div>

        <!-- Optional text input -->
        <div class="text-input-area">
            <input type="text" class="text-input" id="textInput" placeholder="Ya type karo..."
                   onkeydown="if(event.key==='Enter')sendText()">
            <button class="send-btn" id="sendBtn" onclick="sendText()">➤</button>
        </div>
    </div>

    <!-- Session end overlay -->
    <div class="overlay" id="endOverlay">
        <div class="overlay-card">
            <h2>Aaj ki padhai ho gayi! 🎉</h2>
            <p id="summaryText"></p>
            <div class="stats">
                <div class="stat-box">
                    <div class="num" id="statCorrect">0</div>
                    <div class="label">Sahi</div>
                </div>
                <div class="stat-box">
                    <div class="num" id="statTotal">0</div>
                    <div class="label">Total</div>
                </div>
            </div>
            <button class="overlay-btn" onclick="window.location.href='/'">Bye Didi! 👋</button>
        </div>
    </div>

    <script>
    // ============================================================
    // IDNA v7.1.0 — VAD Auto-Recording + Silence Fix
    // ============================================================

    const API = window.location.origin;
    const token = localStorage.getItem('idna_token');
    const studentName = localStorage.getItem('idna_name') || 'Student';

    if (!token) window.location.href = '/';

    // ─── State ─────────────────────────────────────────
    let sessionId = null;
    let vadInstance = null;
    let isProcessing = false;   // True while pipeline is running
    let isDidiSpeaking = false; // True while TTS audio is playing
    let currentAudio = null;

    // Silence timer (Part C fix)
    let inactivityTimer = null;
    const INACTIVITY_TIMEOUT = 30000; // 30 seconds (was 15s)

    // Fallback recording state
    let isRecording = false;
    let mediaRecorder = null;
    let audioChunks = [];
    let audioCache = {};  // Store audio by message ID
    let messageCounter = 0;

    // DOM refs
    const chatArea = document.getElementById('chatArea');
    const typing = document.getElementById('typing');
    const voiceStatus = document.getElementById('voiceStatus');
    const statusText = document.getElementById('statusText');
    const headerStatus = document.getElementById('headerStatus');
    const textInput = document.getElementById('textInput');

    // ─── VAD Initialization ────────────────────────────
    async function initVAD() {
        try {
            vadInstance = await vad.MicVAD.new({
                // When student starts speaking
                onSpeechStart: () => {
                    if (isDidiSpeaking || isProcessing) return;
                    updateVoiceUI('listening');
                    clearInactivityTimer(); // Reset silence timer on speech
                    console.log("[VAD] Speech detected — recording...");

                    // v7.4.3: 25s cap to stay under Sarvam 30s STT limit
                    if (window.vadRecordingTimeout) clearTimeout(window.vadRecordingTimeout);
                    window.vadRecordingTimeout = setTimeout(() => {
                        console.warn("[VAD] 25s cap hit — forcing speech end");
                        if (vadInstance) vadInstance.pause();
                        // Brief delay then resume to trigger onSpeechEnd with collected audio
                        setTimeout(() => {
                            if (vadInstance && !isDidiSpeaking && !isProcessing) vadInstance.start();
                        }, 100);
                    }, 25000);
                },

                // When student stops speaking (silence detected)
                onSpeechEnd: async (audioFloat32) => {
                    // v7.4.3: Clear 25s cap timeout
                    if (window.vadRecordingTimeout) {
                        clearTimeout(window.vadRecordingTimeout);
                        window.vadRecordingTimeout = null;
                    }

                    if (isDidiSpeaking || isProcessing) return;

                    // v7.3.34 Fix 1: Minimum duration check (500ms at 16kHz = 8000 samples)
                    const durationMs = (audioFloat32.length / 16000) * 1000;
                    if (durationMs < 500) {
                        console.log(`[VAD] Misfire — speech too short (${durationMs.toFixed(0)}ms < 500ms), discarding`);
                        return;
                    }

                    isProcessing = true;
                    updateVoiceUI('processing');
                    console.log(`[VAD] Speech ended (${durationMs.toFixed(0)}ms) — sending to pipeline...`);

                    try {
                        // Convert Float32Array (16kHz) to WAV blob for STT
                        const wavBlob = float32ToWav(audioFloat32, 16000);

                        // v7.3.34 Fix 2: Skip if blob too small (< 1KB = noise)
                        if (wavBlob.size < 1024) {
                            console.log(`[VAD] Audio too small (${wavBlob.size} bytes < 1KB), discarding`);
                            isProcessing = false;
                            updateVoiceUI('ready');
                            return;
                        }
                        console.log(`[VAD] Audio blob size: ${wavBlob.size} bytes`);

                        await sendAudioToPipeline(wavBlob);
                    } catch (err) {
                        console.error("[VAD] Pipeline error:", err);
                        updateVoiceUI('error');
                        setTimeout(() => updateVoiceUI('ready'), 2000);
                    } finally {
                        isProcessing = false;
                    }
                },

                // VAD tuning for Indian classroom environments
                positiveSpeechThreshold: 0.6,
                negativeSpeechThreshold: 0.35,
                redemptionFrames: 12,  // ~750ms silence before cutting off
                minSpeechFrames: 5,    // Minimum speech to avoid clicks

                // CDN paths for ONNX model files (v0.0.22 has stable model)
                workletURL: "https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.22/dist/vad.worklet.bundle.min.js",
                modelURL: "https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.22/dist/silero_vad.onnx",
                ortConfig: (ort) => {
                    ort.env.wasm.wasmPaths = "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/";
                },
            });

            console.log("[VAD] Initialized successfully");
            return true;

        } catch (err) {
            console.error("[VAD] Init failed:", err);
            return false;
        }
    }

    // Start VAD listening
    function startListening() {
        updateVoiceUI('ready');  // Always update UI when called
        if (vadInstance && !isDidiSpeaking) {
            vadInstance.start();  // Resume VAD - double-processing guarded in onSpeechEnd
            startInactivityTimer();
        }
    }

    // Pause VAD (when Didi is speaking)
    function pauseListening() {
        if (vadInstance) {
            vadInstance.pause();
        }
        clearInactivityTimer(); // Don't count silence while Didi speaks
    }

    // Convert Float32Array to WAV blob
    function float32ToWav(float32Array, sampleRate) {
        const buffer = new ArrayBuffer(44 + float32Array.length * 2);
        const view = new DataView(buffer);

        const writeString = (offset, str) => {
            for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
        };

        writeString(0, 'RIFF');
        view.setUint32(4, 36 + float32Array.length * 2, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);        // PCM
        view.setUint16(22, 1, true);        // Mono
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);       // 16-bit
        writeString(36, 'data');
        view.setUint32(40, float32Array.length * 2, true);

        const offset = 44;
        for (let i = 0; i < float32Array.length; i++) {
            const s = Math.max(-1, Math.min(1, float32Array[i]));
            view.setInt16(offset + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }

        return new Blob([buffer], { type: 'audio/wav' });
    }

    // ─── Voice UI Updates ──────────────────────────────
    function updateVoiceUI(state) {
        switch (state) {
            case 'ready':
                voiceStatus.className = 'status-dot green pulse';
                statusText.textContent = 'Aapki baari — boliye!';
                break;
            case 'listening':
                voiceStatus.className = 'status-dot green bright';
                statusText.textContent = 'Sun rahi hoon...';
                break;
            case 'processing':
                voiceStatus.className = 'status-dot yellow';
                statusText.textContent = 'Didi soch rahi hai...';
                break;
            case 'didi-speaking':
                voiceStatus.className = 'status-dot blue';
                statusText.textContent = 'Didi bol rahi hai...';
                break;
            case 'error':
                voiceStatus.className = 'status-dot red';
                statusText.textContent = 'Phir se boliye?';
                break;
        }
    }

    // Show fallback mic button if VAD fails
    function showManualMicButton() {
        document.getElementById('voiceIndicator').style.display = 'none';
        document.getElementById('micFallback').style.display = 'block';
    }

    // ─── Inactivity Timer (Part C fix) ─────────────────
    function startInactivityTimer() {
        clearInactivityTimer();
        inactivityTimer = setTimeout(() => {
            // Only trigger if not speaking and not processing
            if (!isDidiSpeaking && !isProcessing && sessionId) {
                console.log("[Silence] 30s inactivity — sending nudge");
                sendSilenceNudge();
            }
        }, INACTIVITY_TIMEOUT);
    }

    function clearInactivityTimer() {
        if (inactivityTimer) {
            clearTimeout(inactivityTimer);
            inactivityTimer = null;
        }
    }

    async function sendSilenceNudge() {
        const formData = new FormData();
        formData.append('session_id', sessionId);
        formData.append('text', '[silence]');

        try {
            const resp = await fetch(`${API}/api/student/session/message`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData,
            });

            if (resp.ok) {
                const data = await resp.json();
                addMessage('didi', data.didi_text, data.didi_audio_b64, data.debug);
                if (data.didi_audio_b64) {
                    await playDidiAudio(data.didi_audio_b64);
                }
            }
        } catch (e) {
            console.error("[Silence] Nudge failed:", e);
        }

        // Restart timer after nudge
        startInactivityTimer();
    }

    // ─── Audio Playback ────────────────────────────────

    // UX FIX: Play audio and show text in SYNC (text appears when audio starts)
    async function playDidiAudioWithText(b64, text, debugInfo = null) {
        console.log("[Audio] playDidiAudioWithText called");

        if (!b64 || b64.length === 0) {
            // No audio - show text after 2s timeout as fallback
            console.log("[Audio] No audio, showing text after 2s fallback");
            setTimeout(() => {
                addMessage('didi', text, null, debugInfo);
                startListening();
            }, 2000);
            return;
        }

        // v10.2.0 FIX Bug 2: ALWAYS show text immediately — never gate on audio
        addMessage('didi', text, b64, debugInfo);
        console.log("[Audio] Text shown FIRST, now attempting audio");

        isDidiSpeaking = true;
        pauseListening();
        updateVoiceUI('didi-speaking');

        return new Promise((resolve) => {
            try {
                const bytes = atob(b64);
                const arr = new Uint8Array(bytes.length);
                for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);

                const blob = new Blob([arr], { type: 'audio/mp3' });
                const url = URL.createObjectURL(blob);

                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio = null;
                }

                currentAudio = new Audio(url);

                let hasEnded = false;

                const cleanup = () => {
                    if (hasEnded) return;
                    hasEnded = true;
                    URL.revokeObjectURL(url);
                    isDidiSpeaking = false;
                    currentAudio = null;
                    setTimeout(() => startListening(), 500);
                    resolve();
                };

                currentAudio.onended = () => {
                    console.log("[Audio] onended");
                    cleanup();
                };

                currentAudio.onerror = (e) => {
                    console.error("[Audio] onerror:", e);
                    cleanup();
                };

                // Safety timeout: 30s max for any audio
                setTimeout(() => {
                    if (isDidiSpeaking && !hasEnded) {
                        console.warn("[Audio] Safety timeout - forcing cleanup");
                        if (currentAudio) {
                            currentAudio.pause();
                        }
                        cleanup();
                    }
                }, 30000);

                currentAudio.play().catch((e) => {
                    console.error("[Audio] Play failed:", e);
                    cleanup();
                });

            } catch (e) {
                console.error("[Audio] Decode error:", e);
                isDidiSpeaking = false;
                startListening();
                resolve();
            }
        });
    }

    async function playDidiAudio(b64) {
        console.log("[Audio] playDidiAudio called, b64 length:", b64 ? b64.length : 0);

        if (!b64 || b64.length === 0) {
            console.error("[Audio] No audio data provided");
            startListening();
            return;
        }

        isDidiSpeaking = true;
        pauseListening();
        updateVoiceUI('didi-speaking');

        return new Promise((resolve) => {
            try {
                console.log("[Audio] Decoding base64...");
                const bytes = atob(b64);
                const arr = new Uint8Array(bytes.length);
                for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);

                console.log("[Audio] Creating blob, size:", arr.length, "bytes");
                const blob = new Blob([arr], { type: 'audio/mp3' });
                const url = URL.createObjectURL(blob);
                console.log("[Audio] Blob URL created:", url);

                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio = null;
                }

                currentAudio = new Audio(url);
                console.log("[Audio] Audio element created");

                let hasEnded = false;
                let maxTimeout = null;
                let lastTimeUpdate = 0;
                let stuckCheckInterval = null;

                const cleanup = () => {
                    if (hasEnded) return;
                    hasEnded = true;
                    console.log("[Audio] Cleanup called");
                    if (maxTimeout) clearTimeout(maxTimeout);
                    if (stuckCheckInterval) clearInterval(stuckCheckInterval);
                    URL.revokeObjectURL(url);
                    isDidiSpeaking = false;
                    currentAudio = null;
                    // v7.3.34 Fix 3: Delay VAD resume by 500ms to avoid echo pickup
                    console.log("[Audio] Waiting 500ms before re-enabling VAD...");
                    setTimeout(() => {
                        console.log("[Audio] Re-enabling VAD after delay");
                        startListening();
                    }, 500);
                    resolve();
                };

                // Primary: onended
                currentAudio.onended = () => {
                    console.log("[Audio] onended fired");
                    cleanup();
                };

                currentAudio.onerror = (e) => {
                    console.error("[Audio] onerror:", e, currentAudio?.error);
                    cleanup();
                };

                // Track progress - if timeupdate stops firing but audio didn't end, it's stuck
                currentAudio.ontimeupdate = () => {
                    lastTimeUpdate = Date.now();
                    // Check if near end (within 0.3s of duration)
                    if (currentAudio && currentAudio.duration > 0 &&
                        currentAudio.duration !== Infinity &&
                        (currentAudio.duration - currentAudio.currentTime) < 0.3) {
                        console.log("[Audio] timeupdate near end - calling cleanup");
                        cleanup();
                    }
                };

                // Create safety timeout BEFORE play() — guarantees cleanup even if play() hangs
                maxTimeout = setTimeout(() => {
                    console.warn("[Audio] Max timeout (30s) - forcing cleanup");
                    cleanup();
                }, 30000);

                // Create stuck checker BEFORE play() — detects if audio stops updating
                stuckCheckInterval = setInterval(() => {
                    if (hasEnded) {
                        clearInterval(stuckCheckInterval);
                        return;
                    }
                    if (lastTimeUpdate > 0 && (Date.now() - lastTimeUpdate) > 2000) {
                        console.warn("[Audio] No timeupdate for 2s - forcing cleanup");
                        cleanup();
                    }
                }, 500);

                console.log("[Audio] Calling play()...");
                currentAudio.play().then(() => {
                    console.log("[Audio] Play started successfully");
                }).catch((e) => {
                    console.error("[Audio] Play failed:", e.name, e.message);
                    cleanup();
                });

            } catch (e) {
                console.error("[Audio] Decode error:", e);
                isDidiSpeaking = false;
                startListening();
                resolve();
            }
        });
    }

    // ─── Send Audio to Pipeline (Streaming v7.1) ────────
    async function sendAudioToPipeline(wavBlob) {
        if (!sessionId) return;

        // Show student bubble placeholder
        addMessage('student', '🎤 ...');
        // UX: Show typing indicator IMMEDIATELY for perceived speed
        showTyping(true, 'Sun rahi hoon...');

        // Convert blob to base64
        const reader = new FileReader();
        const audioB64 = await new Promise((resolve) => {
            reader.onloadend = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(wavBlob);
        });

        try {
            // v7.5.0: Streaming re-enabled with proper SSE buffering
            const resp = await fetch(`${API}/api/student/session/message-stream`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    session_id: sessionId,
                    audio: audioB64,
                }),
            });

            if (!resp.ok) {
                // Fallback to non-streaming endpoint
                console.log('[Stream] Endpoint failed, falling back to non-streaming');
                return sendAudioNonStreaming(wavBlob);
            }

            // UX: Update typing message now that we're processing
            showTyping(true, 'Didi soch rahi hai...');

            // Process SSE stream with proper buffering for partial chunks
            const eventReader = resp.body.getReader();
            const decoder = new TextDecoder();
            let audioQueue = [];
            let isPlaying = false;
            let fullText = '';
            let transcript = '';
            let verdict = null;
            let newState = null;
            let debugInfo = null;  // v10.3.0: Debug info for chat UI
            let sseBuffer = '';  // v7.5.0: Buffer for incomplete SSE events

            while (true) {
                const { done, value } = await eventReader.read();
                if (done) break;

                // v7.5.0: Append to buffer instead of parsing immediately
                sseBuffer += decoder.decode(value, { stream: true });

                // Split on double newline (SSE event boundary)
                const events = sseBuffer.split('\n\n');
                // Keep the last (potentially incomplete) chunk in buffer
                sseBuffer = events.pop() || '';

                for (const event of events) {
                    const lines = event.split('\n').filter(l => l.startsWith('data: '));
                    for (const line of lines) {
                        try {
                            const data = JSON.parse(line.substring(6));

                        if (data.type === 'audio_chunk') {
                            console.log('[SSE] AUDIO_CHUNK received:', data.index, 'size:', data.audio?.length);
                            if (data.audio) {
                                const audioBytes = Uint8Array.from(atob(data.audio), c => c.charCodeAt(0));
                                const blob = new Blob([audioBytes], { type: 'audio/mp3' });
                                audioQueue.push({ blob, isLast: data.is_last });

                                // Start playing first chunk immediately
                                if (!isPlaying && audioQueue.length === 1) {
                                    isPlaying = true;
                                    isDidiSpeaking = true;
                                    pauseListening();
                                    updateVoiceUI('didi-speaking');
                                    showTyping(false);  // UX: Hide typing when audio starts
                                    playNextChunk();
                                }
                            }
                        }

                        if (data.type === 'text') {
                            fullText = data.content;
                            console.log('[SSE] TEXT received:', fullText?.length, 'chars', fullText?.substring(0, 50));
                        }

                        if (data.type === 'transcript') {
                            transcript = data.content;
                            // Update student bubble
                            const studentMsgs = chatArea.querySelectorAll('.msg.student');
                            const lastStudent = studentMsgs[studentMsgs.length - 1];
                            if (lastStudent && transcript) {
                                lastStudent.querySelector('.text').textContent = transcript;
                            }
                        }

                        if (data.type === 'verdict') {
                            verdict = data.value;
                            // Update student bubble with emoji
                            if (verdict !== null) {
                                const studentMsgs = chatArea.querySelectorAll('.msg.student');
                                const lastStudent = studentMsgs[studentMsgs.length - 1];
                                if (lastStudent) {
                                    const emoji = verdict ? '✅' : '❌';
                                    lastStudent.querySelector('.text').textContent = transcript + ' ' + emoji;
                                }
                            }
                        }

                        if (data.type === 'debug') {
                            debugInfo = data;
                        }

                        if (data.type === 'done') {
                            newState = data.state;
                            console.log('[SSE] DONE received, state:', newState, 'fullText:', fullText?.length, 'chars');
                            // Add Didi's message to chat (without audio - already playing)
                            if (fullText) {
                                console.log('[SSE] Adding message to chat:', fullText.substring(0, 50));
                                addMessage('didi', fullText, null, debugInfo);
                            } else {
                                console.warn('[SSE] NO TEXT to display! fullText is empty');
                            }
                            if (newState === 'SESSION_COMPLETE') {
                                setTimeout(() => endSession(), 2000);
                            }
                        }
                    } catch (e) {
                        console.error('[SSE] Parse error:', e, line);
                    }
                }
                }  // close for (const event of events)
            }

            // Play audio chunks sequentially
            function playNextChunk() {
                if (audioQueue.length === 0) {
                    isDidiSpeaking = false;
                    startListening();
                    return;
                }

                const { blob } = audioQueue.shift();
                const url = URL.createObjectURL(blob);
                const audio = new Audio(url);

                audio.onended = () => {
                    URL.revokeObjectURL(url);
                    playNextChunk();
                };

                audio.onerror = (e) => {
                    console.error('[AUDIO] Playback error:', e);
                    URL.revokeObjectURL(url);
                    playNextChunk();
                };

                audio.play().catch((e) => {
                    console.error('[AUDIO] Play failed:', e);
                    playNextChunk();
                });
            }

        } catch (err) {
            console.error('[Stream] Error:', err);
            // Fallback to non-streaming
            return sendAudioNonStreaming(wavBlob);
        }
    }

    // Fallback non-streaming send (for older browsers or if streaming fails)
    async function sendAudioNonStreaming(wavBlob) {
        const formData = new FormData();
        formData.append('session_id', sessionId);
        formData.append('audio', wavBlob, 'recording.wav');

        try {
            const resp = await fetch(`${API}/api/student/session/message`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData,
            });

            showTyping(false);

            if (!resp.ok) {
                // v7.4.3: Handle session conflict (400 = session_id mismatch or expired)
                if (resp.status === 400) {
                    addMessage('didi', 'Session expired. Please refresh the page. (Agar aapne doosri tab mein khola hai, woh band karein.)');
                    updateVoiceUI('error');
                    pauseListening(); // Stop VAD completely
                    return; // Don't retry - user must refresh
                }
                throw new Error('Message failed');
            }

            const data = await resp.json();
            logLatency(data);

            const studentMsgs = chatArea.querySelectorAll('.msg.student');
            const lastStudent = studentMsgs[studentMsgs.length - 1];
            if (lastStudent && data.student_transcript) {
                const text = data.verdict
                    ? `${data.student_transcript} ${getVerdictEmoji(data.verdict)}`
                    : data.student_transcript;
                lastStudent.querySelector('.text').textContent = text;
            }

            // UX FIX: Buffer text until audio plays (voice/text sync)
            if (data.didi_audio_b64) {
                await playDidiAudioWithText(data.didi_audio_b64, data.didi_text, data.debug);
            } else {
                // No audio - show text immediately with 2s fallback
                addMessage('didi', data.didi_text, null, data.debug);
                startListening();
            }

            if (data.state === 'SESSION_COMPLETE') {
                setTimeout(() => endSession(), 2000);
            }

        } catch (err) {
            showTyping(false);
            addMessage('didi', 'Kuch gadbad ho gayi. Ek baar phir try karo.');
            updateVoiceUI('error');
            setTimeout(() => startListening(), 2000);
        }
    }

    // ─── Send Text ─────────────────────────────────────
    async function sendText() {
        const text = textInput.value.trim();
        if (!text || !sessionId) return;

        textInput.value = '';
        clearInactivityTimer();

        addMessage('student', text);
        // UX: Show typing indicator IMMEDIATELY for perceived speed
        showTyping(true, 'Didi soch rahi hai...');
        updateVoiceUI('processing');

        const formData = new FormData();
        formData.append('session_id', sessionId);
        formData.append('text', text);

        try {
            const resp = await fetch(`${API}/api/student/session/message`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData,
            });

            showTyping(false);

            if (!resp.ok) {
                // v7.4.3: Handle session conflict (400 = session_id mismatch or expired)
                if (resp.status === 400) {
                    addMessage('didi', 'Session expired. Please refresh the page. (Agar aapne doosri tab mein khola hai, woh band karein.)');
                    updateVoiceUI('error');
                    pauseListening();
                    return;
                }
                throw new Error('Message failed');
            }

            const data = await resp.json();
            logLatency(data);

            // UX FIX: Buffer text until audio plays (voice/text sync)
            if (data.didi_audio_b64) {
                await playDidiAudioWithText(data.didi_audio_b64, data.didi_text, data.debug);
            } else {
                addMessage('didi', data.didi_text, null, data.debug);
                startListening();
            }

            if (data.state === 'SESSION_COMPLETE') {
                setTimeout(() => endSession(), 2000);
            }

        } catch (err) {
            showTyping(false);
            addMessage('didi', 'Connection mein problem. Ek baar phir try karo.');
            startListening();
        }
    }

    // ─── Fallback Manual Recording ─────────────────────
    async function toggleRecording() {
        if (isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    }

    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                audio: { echoCancellation: true, noiseSuppression: true }
            });
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
            audioChunks = [];

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) audioChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                stream.getTracks().forEach(t => t.stop());
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                sendAudioToPipeline(blob);
            };

            mediaRecorder.start();
            isRecording = true;
            document.getElementById('micBtn').classList.add('recording');
            document.getElementById('micBtn').textContent = '⏹';
            clearInactivityTimer();

        } catch (err) {
            console.error('Mic access denied:', err);
            addMessage('didi', 'Microphone ki permission chahiye.');
        }
    }

    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
        }
        isRecording = false;
        document.getElementById('micBtn').classList.remove('recording');
        document.getElementById('micBtn').textContent = '🎤';
    }

    // ─── Session Start ─────────────────────────────────
    async function startSession() {
        headerStatus.textContent = 'Connecting...';
        statusText.textContent = 'Starting...';

        try {
            const resp = await fetch(`${API}/api/student/session/start`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
            });

            if (!resp.ok) throw new Error('Session start failed');

            const data = await resp.json();
            sessionId = data.session_id;
            headerStatus.textContent = 'Online';

            // UX FIX: Show greeting text synced with audio playback
            if (data.greeting_audio_b64) {
                await playDidiAudioWithText(data.greeting_audio_b64, data.greeting_text);
            } else {
                addMessage('didi', data.greeting_text);
                startListening();
            }

        } catch (err) {
            headerStatus.textContent = 'Connection error';
            statusText.textContent = 'Error';
            addMessage('didi', 'Server se connect nahi ho pa rahi. Thodi der baad try karo.');
        }
    }

    // ─── End Session ───────────────────────────────────
    async function endSession() {
        clearInactivityTimer();
        if (vadInstance) vadInstance.pause();

        if (!sessionId) {
            window.location.href = '/';
            return;
        }

        try {
            const formData = new FormData();
            formData.append('session_id', sessionId);

            const resp = await fetch(`${API}/api/student/session/end`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData,
            });

            if (resp.ok) {
                const data = await resp.json();
                document.getElementById('summaryText').textContent = data.summary_text;
                document.getElementById('statCorrect').textContent = data.questions_correct;
                document.getElementById('statTotal').textContent = data.questions_attempted;

                if (data.summary_audio_b64) {
                    playDidiAudio(data.summary_audio_b64);
                }
            }
        } catch (e) { /* show overlay anyway */ }

        document.getElementById('endOverlay').classList.add('show');
    }

    // ─── Messages ──────────────────────────────────────
    function addMessage(who, text, audioB64 = null, debugInfo = null) {
        const div = document.createElement('div');
        div.className = `msg ${who}`;

        // Store audio in cache, reference by ID (fixes 366KB onclick bug)
        const msgId = ++messageCounter;
        if (audioB64 && who === 'didi') {
            audioCache[msgId] = audioB64;
        }

        let html = `<div class="text">${text}</div>`;

        if (audioB64 && who === 'didi') {
            html += `<button class="play-btn" onclick="playAudioById(${msgId})">
                🔊 Sunein
            </button>`;
        }

        const now = new Date();
        const time = now.getHours().toString().padStart(2,'0') + ':' +
                     now.getMinutes().toString().padStart(2,'0');
        html += `<div class="timestamp">${time}</div>`;

        // v10.3.0: Debug line for Didi messages (temporary)
        if (who === 'didi' && debugInfo) {
            const cls = debugInfo.classifier || '?';
            const vrd = debugInfo.verdict || 'none';
            const sb = debugInfo.state_before || '?';
            const sa = debugInfo.state_after || '?';
            const qid = debugInfo.question_id ? debugInfo.question_id.substring(0, 8) : '?';
            const timing = debugInfo.total_ms ? ` | ${debugInfo.classifier_ms||0}+${debugInfo.eval_ms||0}+${debugInfo.llm_ms||0}+${debugInfo.tts_ms||0}=${debugInfo.total_ms}ms` : '';
            html += `<div class="debug-line">[classifier: ${cls} | verdict: ${vrd} | state: ${sb} → ${sa} | q: ${qid}${timing}]</div>`;
        }

        div.innerHTML = html;
        chatArea.insertBefore(div, typing);
        scrollToBottom();
    }

    // Play audio from cache by message ID
    function playAudioById(msgId) {
        const b64 = audioCache[msgId];
        if (b64) {
            playDidiAudio(b64);
        }
    }

    function scrollToBottom() {
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping(show, message = 'Didi soch rahi hai...') {
        typing.classList.toggle('show', show);
        const typingTextEl = document.getElementById('typingText');
        if (typingTextEl) typingTextEl.textContent = message;
        if (show) scrollToBottom();
    }

    // ─── Helpers ───────────────────────────────────────
    function logLatency(data) {
        if (data.total_ms) {
            console.log(`⏱️ Latency: STT=${data.stt_ms}ms LLM=${data.llm_ms}ms TTS=${data.tts_ms}ms Total=${data.total_ms}ms`);
        }
    }

    function getVerdictEmoji(v) {
        if (v === 'CORRECT') return '✅';
        if (v === 'INCORRECT') return '❌';
        return '';
    }

    // ─── Init ──────────────────────────────────────────
    window.addEventListener('load', async () => {
        // Request mic permission first
        try {
            await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (err) {
            alert('Mic permission chahiye. Please allow microphone access.');
            showManualMicButton();
            await startSession();
            return;
        }

        // Try to initialize VAD
        const vadOk = await initVAD();

        if (!vadOk) {
            console.log("[VAD] Falling back to manual mic button");
            showManualMicButton();
        }

        // Start the session
        await startSession();
    });
    </script>
