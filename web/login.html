<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IDNA EdTech - Learn Smart</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        
        .logo {
            margin-bottom: 36px;
        }
        
        .logo-img {
            width: 330px;
            height: 330px;
            margin-bottom: 0;
            filter: drop-shadow(0 8px 30px rgba(0,0,0,0.3));
        }
        
        .cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            text-decoration: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            display: block;
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
        }
        
        .card:active {
            transform: scale(0.98);
        }
        
        .card-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }
        
        .card-title {
            font-size: 24px;
            font-weight: 700;
            color: #1F2937;
            margin-bottom: 4px;
        }
        
        .card-subtitle {
            font-size: 18px;
            font-weight: 600;
            color: #6B7280;
        }
        
        .card-desc {
            font-size: 14px;
            color: #9CA3AF;
            margin-top: 12px;
        }
        
        /* PIN Login Form */
        .pin-form {
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }
        .pin-form .card-icon { font-size: 48px; margin-bottom: 12px; }
        .pin-form .card-title { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
        .pin-form .card-subtitle { font-size: 14px; color: #666; margin-bottom: 20px; }
        .pin-input {
            width: 160px;
            text-align: center;
            font-size: 28px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            letter-spacing: 8px;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .pin-input:focus { border-color: #667eea; }
        .pin-btn {
            display: block;
            width: 160px;
            margin: 16px auto 0;
            padding: 12px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .pin-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
        .pin-btn:active { transform: translateY(0); }
        .pin-error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 10px;
            min-height: 20px;
        }

        .student-card {
            border-bottom: 5px solid #10B981;
        }
        
        .parent-card {
            border-bottom: 5px solid #F59E0B;
        }
        
        .footer {
            margin-top: 40px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
            50% { box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 8px rgba(255,255,255,0.1); }
        }
        
        .card:nth-child(1) { animation: pulse 3s infinite; }
        .card:nth-child(2) { animation: pulse 3s infinite 1.5s; }
    </style>
</head>

        <div class="cards">
            <div class="pin-form" id="pinForm">
                <div class="card-icon">&#128218;</div>
                <div class="card-title">पढ़ाई करें</div>
                <div class="card-subtitle">Enter your PIN to start</div>
                <input type="tel" class="pin-input" id="pinInput" maxlength="4" placeholder="••••" autocomplete="off">
                <button class="pin-btn" id="pinBtn" onclick="loginWithPin()">Start →</button>
                <div class="pin-error" id="pinError"></div>
            </div>
            
            <a href="/parent" class="card parent-card">
                <div class="card-icon">&#128104;&#8205;&#128105;&#8205;&#128102;</div>
                <div class="card-title">रिपोर्ट सुनें</div>
                <div class="card-subtitle">Parent Report</div>
                <div class="card-desc">Listen to your child's progress</div>
            </a>
        </div>
        
        <div class="footer">
            Made with ❤️ for Indian Students
        </div>
    </div>
    <script>
        const pinInput = document.getElementById('pinInput');
        const pinError = document.getElementById('pinError');
        const pinBtn = document.getElementById('pinBtn');

        // Auto-submit on 4 digits
        pinInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '');
            if (this.value.length === 4) loginWithPin();
        });

        // Enter key
        pinInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && this.value.length === 4) loginWithPin();
        });

        async function loginWithPin() {
            const pin = pinInput.value.trim();
            if (pin.length !== 4) {
                pinError.textContent = '4-digit PIN required';
                return;
            }
            pinBtn.disabled = true;
            pinBtn.textContent = 'Logging in...';
            pinError.textContent = '';

            try {
                const resp = await fetch('/api/auth/student', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin })
                });
                if (!resp.ok) {
                    pinError.textContent = 'Invalid PIN. Try again.';
                    pinInput.value = '';
                    pinInput.focus();
                    return;
                }
                const data = await resp.json();
                localStorage.setItem('idna_token', data.token);
                localStorage.setItem('idna_name', data.name);
                window.location.href = '/student';
            } catch (err) {
                pinError.textContent = 'Connection error. Try again.';
            } finally {
                pinBtn.disabled = false;
                pinBtn.textContent = 'Start →';
            }
        }

        // Focus PIN input on load
        pinInput.focus();
    </script>
